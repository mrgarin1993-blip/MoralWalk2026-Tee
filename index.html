<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHRA TEE - ศีลธรรมเดินดิน</title>
    <style>
        /* 1. ตั้งค่าพื้นฐานทั้งหมดใหม่เพื่อล้างค่าเก่าที่ทำให้เละ */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: 'Tahoma', sans-serif; overflow: hidden; }
        
        /* 2. หน้าหลักรูปภาพ */
        .main-wrapper { 
            position: relative; 
            width: 100%; 
            max-width: 500px; 
            margin: 0 auto; 
            height: 100vh; 
            display: flex;
            align-items: center;
        }

        .bg-image { width: 100%; height: auto; display: block; }

        /* 3. ตำแหน่งปุ่มล่องหน (คำนวณใหม่ให้แม่นยำขึ้น) */
        .touch-area { position: absolute; cursor: pointer; background: transparent; z-index: 10; }
        
        .area-tiktok   { top: 11%; left: 10%; width: 35%; height: 12%; }
        .area-social   { top: 11%; right: 10%; width: 35%; height: 12%; }
        .area-youtube  { top: 25%; left: 10%; width: 35%; height: 12%; }
        .area-prayer   { top: 25%; right: 10%; width: 35%; height: 12%; }
        .area-follow   { top: 48%; left: 50%; width: 45%; height: 8%; transform: translateX(-50%); }
        .area-share    { bottom: 10%; left: 35%; width: 30%; height: 10%; }

        /* 4. หน้าต่างเด้ง (Overlay) แก้ไขให้สวยงามและจัดกลาง */
        .overlay {
            display: none; /* ซ่อนไว้ก่อน */
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .modal-card {
            width: 100%;
            max-width: 380px;
            background: #1a1a1a;
            border: 2px solid #ffd700;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
        }

        .modal-title { color: #ffd700; font-size: 24px; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }

        /* 5. รายการลิงก์และเนื้อหาบทสวด */
        .list-item {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #252525;
            color: #ffd700 !important; /* บังคับสีทอง */
            text-decoration: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            border: 1px solid #333;
        }

        .prayer-content {
            color: #ffffff;
            font-size: 16px;
            line-height: 1.8;
            max-height: 50vh;
            overflow-y: auto;
            text-align: center;
            padding: 10px;
        }

        /* 6. ปุ่มปิดสีแดง */
        .btn-close {
            margin-top: 25px;
            padding: 15px 60px;
            background: #cc0000;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <!-- รูปพื้นหลังหลัก -->
        <img src="https://ibb.co" class="bg-image">

        <!-- ปุ่มกดล่องหนบนรูป -->
        <div onclick="window.open('https://tiktok.com')" class="touch-area area-tiktok"></div>
        <div onclick="openPop('pop-social')" class="touch-area area-social"></div>
        <div onclick="window.open('https://youtube.com')" class="touch-area area-youtube"></div>
        <div onclick="openPop('pop-prayer')" class="touch-area area-prayer"></div>
        <div onclick="window.open('https://facebook.com')" class="touch-area area-follow"></div>
        <div onclick="shareApp()" class="touch-area area-share"></div>
    </div>

    <!-- หน้าต่างย่อย 1: รวมลิงก์ (เหรียญขวาบน) -->
    <div id="pop-social" class="overlay">
        <div class="modal-card">
            <div class="modal-title">ติดต่อ / ติดตาม</div>
            <a href="https://m.me" target="_blank" class="list-item">💬 Messenger (ทักแชท)</a>
            <a href="https://facebook.com" target="_blank" class="list-item">🚩 เพจศีลธรรมเดินดิน</a>
            <a href="https://tiktok.com" target="_blank" class="list-item">📱 TikTok</a>
            <button class="btn-close" onclick="closePop('pop-social')">กลับหน้าหลัก</button>
        </div>
    </div>

    <!-- หน้าต่างย่อย 2: บทสวดมนต์ (เหรียญขวาล่าง) -->
    <div id="pop-prayer" class="overlay">
        <div class="modal-card">
            <div class="modal-title">บทสวดมนต์</div>
            <div class="prayer-content">
                <p style="color:#ffd700; font-weight:bold;">📜 สายป้องกัน & คุ้มครอง</p>
                นะโม ตัสสะ ภะคะวะโต อะระหะโต สัมมาสัมพุทธัสสะ (3 จบ)<br>
                อิติปิโส วิเสเสอิ อิเสเส พุทธะนาเมอิ...<br><br>
                <hr style="border:0.5px solid #333">
                <p style="color:#ffd700; font-weight:bold;">✨ สายกันภัย & เสริมขลัง</p>
                (ใส่เนื้อหาบทสวดเพิ่มเติมได้ตรงนี้)<br>
                พุทธัง สรณัง คัจฉามิ...
            </div>
            <button class="btn-close" onclick="closePop('pop-prayer')">กลับหน้าหลัก</button>
        </div>
    </div>

    <script>
        function openPop(id) { document.getElementById(id).style.display = 'flex'; }
        function closePop(id) { document.getElementById(id).style.display = 'none'; }

        function shareApp() {
            if (navigator.share) {
                navigator.share({ title: 'PHRA TEE', url: window.location.href });
            } else {
                alert("ก๊อปปี้ลิงก์เพื่อแชร์ต่อได้เลยครับ");
            }
        }
    </script>
</body>
</html>
