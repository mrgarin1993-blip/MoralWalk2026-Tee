<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHRA TEE - ศีลธรรมเดินดิน</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* ล็อกหน้าจอให้พอดีกับมือถือแนวตั้ง */
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            font-family: 'Kanit', sans-serif; 
            background-color: #000; 
            overflow: hidden; 
        }
        /* คอนเทนเนอร์หลัก ปรับให้สูงเต็มหน้าจอ 100% ของมือถือ */
        .container { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
            max-width: 500px; /* คุมขนาดสำหรับเปิดในคอม */
            margin: 0 auto; 
            overflow: hidden;
        }
        /* ปรับรูปภาพให้เป็นแนวตั้งและยืดเต็มจอพอดี */
        .main-img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; /* บังคับรูปให้ยืดเต็มพื้นที่แนวตั้ง */
            display: block; 
        }

        .btn { position: absolute; cursor: pointer; text-decoration: none; -webkit-tap-highlight-color: transparent; }
        
        /* ปุ่มต่างๆ */
        /* โบร์แดง - MoralWalk 2026 */
        .btn-moral-walk { top: 43.5%; left: 31%; width: 38%; height: 3.5%; }
        /* ปุ่มเขียว - ติดตาม */
        .btn-follow { top: 48%; left: 41%; width: 18%; height: 7.5%; }
        /* เหรียญซ้ายบน - ติ๊กต๊อก */
        .btn-tiktok { top: 15%; left: 12%; width: 20%; height: 12%; border-radius: 50%; }
        /* เหรียญขวาบน-สนทนาธรรม&ปรดทุกข์ */
        .btn-dhamma-live { top: 8%; right: 5%; width: 20%; height: 12%; border-radius: 50%; }
         /* เหรียญซ้ายล่าง - ยูทูป */
        .btn-youtube { top: 25%; left: 12%; width: 20%; height: 12%; border-radius: 50%; }
         /* เหรียญขวาล่าง - รวมบทสวด */
        .btn-prayers { top: 30%; right: 5%; width: 20%; height: 12%; border-radius: 50%; }
                 /* เหรียญแชร์ล่างสุด */
        .btn-share { 
            bottom: 6.8%; 
            left: 30.5%; 
            width: 40%; 
            height: 25.5%; 
            border-radius: 50%; 
        }

        /* เมนู Overlay */
        .overlay-menu { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); z-index: 999; flex-direction: column; align-items: center; justify-content: center; color: #fff; }
        .menu-title { font-size: 24px; font-weight: 600; margin-bottom: 30px; text-align: center; color: #ffd700; }
        .menu-list { width: 85%; max-width: 350px; }
        .menu-item { display: flex; align-items: center; justify-content: center; background: #fff; margin-bottom: 15px; padding: 15px; border-radius: 50px; text-decoration: none; color: #333; font-size: 18px; font-weight: 500; transition: 0.3s; cursor: pointer; border: none; width: 100%; text-align: center; }
        
        /* หน้าเนื้อหาบทสวด & รายชื่อบทสวด */
        .prayer-content { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; z-index: 1000; overflow-y: auto; padding: 20px; box-sizing: border-box; color: #fff; }
        .prayer-text { font-size: 20px; line-height: 1.8; text-align: center; white-space: pre-line; margin-bottom: 40px; }
        .close-btn { margin: 20px auto; padding: 10px 30px; background: #cc0000; color: white; border-radius: 50px; cursor: pointer; text-align: center; width: fit-content; }
        .back-btn { margin-bottom: 20px; color: #ffd700; cursor: pointer; text-decoration: underline; display: inline-block; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://i.ibb.co/zT9rCBmX/1777702831078.png" alt="หน้าหลัก" class="main-img">
    <a href="https://www.facebook.com/share/1EQkr3tUsD/" target="_blank" class="btn btn-moral-walk"></a>
    <a href="https://www.facebook.com/share/1EQkr3tUsD/" target="_blank" class="btn btn-follow"></a>
    <a href="https://www.tiktok.com/@somo5757" target="_blank" class="btn btn-tiktok"></a>
    <div class="btn btn-dhamma-live" onclick="openMenu('menu-live')"></div>
    <a href="https://music.youtube.com/playlist?list=PLvfSm3r31XPAr6tFZfab7imzezJzKhEa1" target="_blank" class="btn btn-youtube"></a>
    <div class="btn btn-prayers" onclick="openMenu('menu-prayers')"></div>
    <div class="btn btn-share" onclick="shareWeb()"></div>
</div>
        /* ลิงค์MEเพจ,MEติ๊กตอก,เฟสส่วนตัว,เพจหลัก */
<div id="menu-live" class="overlay-menu">
    <div class="menu-title">เมนูศีลธรรมที่เดินดิน</div>
    <div class="menu-list">
        <a href="https://m.me/moralwalk2026" class="menu-item">💬 คุยผ่าน Messenger</a>
        <a href="https://tiktok.me/group/ZS9SDxUCm/" class="menu-item">🎵 ดู TikTok ธรรมะ</a>
        <a href="https://www.facebook.com/100082445234089" class="menu-item">👤 Facebook ส่วนตัว</a>
        <a href="https://www.facebook.com/share/1EQkr3tUsD/" class="menu-item">🙏 เพจศีลธรรมที่เดินดิน</a>
    </div>
    <div class="close-btn" onclick="closeMenu('menu-live')">ปิดหน้าต่าง</div>
</div>

<div id="menu-prayers" class="overlay-menu">
    <div class="menu-title">เลือกสายบทสวดมนต์</div>
    <div class="menu-list">
        <div class="menu-item" onclick="showSubMenu('protection')">🛡️ สายป้องกัน</div>
        <div class="menu-item" onclick="showSubMenu('guardian')">⚔️ สายคุ้มครอง</div>
        <div class="menu-item" onclick="showSubMenu('amulet')">✨ สายกันภัย&เสริมขลัง</div>
    </div>
    <div class="close-btn" onclick="closeMenu('menu-prayers')">ปิดหน้าต่าง</div>
</div>

<div id="sub-menu-display" class="prayer-content">
    <div class="back-btn" onclick="hideSubMenu()">← กลับไปเลือกสาย</div>
    <h2 id="sub-menu-title" style="text-align: center; color: #ffd700;"></h2>
    <div id="sub-menu-list" class="menu-list" style="margin: 0 auto;">
        </div>
</div>

<div id="prayer-display" class="prayer-content">
    <div class="back-btn" onclick="hidePrayer()">← กลับไปรายชื่อบทสวด</div>
    <h2 id="prayer-title" style="text-align: center; color: #ffd700;"></h2>
    <div id="prayer-detail" class="prayer-text"></div>
    <div class="close-btn" onclick="closeAll()">ปิดทั้งหมด</div>
</div>

<script>
    function openMenu(id) { document.getElementById(id).style.display = 'flex'; }
    function closeMenu(id) { document.getElementById(id).style.display = 'none'; }

    // --- ส่วนข้อมูลบทสวด (หลวงพี่เพิ่ม/ลด ตรงนี้ได้เลย) ---
    const prayerData = {
        'protection': {
            categoryName: 'สายป้องกัน',
            items: [
                { name: 'บทสวดมงคลจักรวาล 8 ทิศ', text: '(นะโม 3 จบ)\nสัมปะจิตฉามิ นาสังสิโม...\nอุดมไปด้วยพุทธคุณป้องกันภัย' },
                { name: 'บทพระคาถาชินบัญชร', text: 'ปุตตะกาโม ละเภปุตตัง...\nใช้สำหรับป้องกันสิ่งอัปมงคล' }
            ]
        },
        'guardian': {
            categoryName: 'สายคุ้มครอง',
            items: [
                { name: 'บทสวดอิติปิโส', text: 'อิติปิโส ภะคะวา อะระหัง สัมมาสัมพุทโธ...' },
                { name: 'บทสวดพุทธชัยมงคลคาถา (พาหุง)', text: 'พาหุง สะหัสสะมะภินิมมิตะสาวุธันตัง...' }
            ]
        },
        'amulet': {
            categoryName: 'สายกันภัย & เสริมขลัง',
            items: [
                { name: 'บทคาถาเงินล้าน', text: 'นาสังสิโม พรหมา จะ มหาเทวา...' },
                { name: 'บทแผ่เมตตาให้ตนเอง', text: 'อะหัง สุขิโต โหมิ...' }
            ]
        }
    };

    // ฟังก์ชันเปิดรายชื่อบทสวดย่อย
    function showSubMenu(category) {
        const data = prayerData[category];
        const listContainer = document.getElementById('sub-menu-list');
        document.getElementById('sub-menu-title').innerText = data.categoryName;
        
        // ล้างค่าเก่าแล้วสร้างปุ่มรายชื่อบทสวดใหม่
        listContainer.innerHTML = '';
        data.items.forEach((item, index) => {
            const btn = document.createElement('div');
            btn.className = 'menu-item';
            btn.innerText = item.name;
            btn.onclick = () => showPrayerContent(category, index);
            listContainer.appendChild(btn);
        });
        
        document.getElementById('sub-menu-display').style.display = 'block';
    }

    // ฟังก์ชันแสดงเนื้อหาบทสวด
    function showPrayerContent(category, index) {
        const item = prayerData[category].items[index];
        document.getElementById('prayer-title').innerText = item.name;
        document.getElementById('prayer-detail').innerText = item.text;
        document.getElementById('prayer-display').style.display = 'block';
    }

    function hideSubMenu() { document.getElementById('sub-menu-display').style.display = 'none'; }
    function hidePrayer() { document.getElementById('prayer-display').style.display = 'none'; }
    
    function closeAll() {
        hidePrayer();
        hideSubMenu();
        closeMenu('menu-prayers');
    }

    function shareWeb() {
        const shareData = { title: 'PHRA TEE - ศีลธรรมเดินดิน', url: window.location.href };
        if (navigator.share) {
            navigator.share(shareData).catch(err => console.log(err));
        } else {
            alert("Copy URL: " + window.location.href);
        }
    }
</script>
</body>
</html>
